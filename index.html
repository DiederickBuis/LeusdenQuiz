<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leusden Quiz — Hoe goed ken jij het dorp?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
/* ── DESIGN TOKENS ── */
:root {
  --ink:   #0d1117;
  --ink2:  #161c27;
  --ink3:  #1e2636;
  --gold:  #c9a84c;
  --gold2: #e8c96a;
  --cream: #f5f0e8;
  --cream2:#ede7d9;
  --muted: #8a95a8;
  --groen: #2a7d4f;
  --rood:  #b03030;
  --font-serif: 'Playfair Display', Georgia, serif;
  --font-sans:  'DM Sans', 'Segoe UI', sans-serif;
}

/* ── RESET ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100%; overflow: hidden;
  background: var(--ink); color: var(--cream);
  font-family: var(--font-sans); font-weight: 400;
  -webkit-font-smoothing: antialiased;
}

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(30px); }
  to   { opacity: 1; transform: translateY(0); }
}
.fade-up {
  opacity: 0; animation: fadeUp .7s ease forwards;
}
.fade-up:nth-child(2) { animation-delay: .1s; }
.fade-up:nth-child(3) { animation-delay: .2s; }
.fade-up:nth-child(4) { animation-delay: .3s; }
.fade-up:nth-child(5) { animation-delay: .4s; }
.fade-up:nth-child(6) { animation-delay: .5s; }
.fade-up:nth-child(7) { animation-delay: .6s; }

/* ── SCREEN SYSTEM ── */
.scherm {
  position: absolute; inset: 0;
  display: none; opacity: 0;
  transition: opacity .5s ease;
  flex-direction: column;
}
.scherm.actief { display: flex; }
.scherm.in     { opacity: 1; }

/* ── STARTPAGINA ── */
#v-start {
  align-items: center; justify-content: center; gap: 18px;
  background-color: var(--ink);
  background-image:
    linear-gradient(rgba(201,168,76,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,168,76,.04) 1px, transparent 1px);
  background-size: 60px 60px;
}
.start-super {
  font-size: .72rem; font-weight: 500; letter-spacing: .25em;
  text-transform: uppercase; color: var(--gold); opacity: .85;
}
.start-titel {
  font-family: var(--font-serif); font-size: 7rem; font-weight: 900;
  line-height: 1; color: var(--cream);
}
.start-titel em {
  color: var(--gold); font-style: italic;
}
.start-svg { width: 420px; max-width: 80vw; }
.start-sub {
  font-size: 1.25rem; font-weight: 300; color: var(--cream2);
}
.btn-goud {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 14px 36px; border: none; border-radius: 999px;
  background: var(--gold); color: var(--ink); cursor: pointer;
  font-family: var(--font-sans); font-size: 1rem; font-weight: 500;
  transition: transform .2s, background .2s;
}
.btn-goud:hover { background: var(--gold2); transform: scale(1.04); }
.start-stats {
  display: flex; gap: 48px; margin-top: 12px;
}
.start-stats div { text-align: center; }
.start-stats .nummer {
  font-family: var(--font-serif); font-size: 2rem; font-weight: 700;
  color: var(--gold); display: block; line-height: 1.1;
}
.start-stats .label {
  font-size: .78rem; color: var(--muted); text-transform: uppercase;
  letter-spacing: .1em;
}

/* ── QUIZ SCHERM ── */
#v-quiz { flex-direction: column; background: var(--ink2); }

/* topbalk */
.topbalk {
  display: grid; grid-template-columns: 1fr auto 1fr;
  align-items: center; padding: 14px 28px;
  border-bottom: 1px solid rgba(201,168,76,.12);
  background: var(--ink);
}
.topbalk-links a {
  color: var(--cream2); text-decoration: none; font-size: .92rem;
  transition: color .2s;
}
.topbalk-links a:hover { color: var(--gold); }
.topbalk-midden {
  display: flex; align-items: center; gap: 14px;
  font-size: .85rem; color: var(--muted);
}
.voortgang-track {
  width: 240px; height: 4px; border-radius: 99px;
  background: rgba(201,168,76,.15);
}
.voortgang-vul {
  height: 100%; border-radius: 99px;
  background: var(--gold); transition: width .4s ease;
}
.topbalk-rechts {
  text-align: right; font-family: var(--font-serif);
  font-size: 1.15rem; font-weight: 700; color: var(--gold);
}

/* quiz body */
.quiz-body {
  display: flex; flex: 1; overflow: hidden;
}

/* links paneel */
.quiz-links {
  width: 420px; min-width: 420px;
  display: flex; flex-direction: column;
  padding: 32px 32px 24px; gap: 18px;
  overflow-y: auto;
}
.badge-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 16px; border-radius: 999px;
  border: 1px solid rgba(201,168,76,.35);
  font-size: .78rem; color: var(--gold);
  width: fit-content;
}
.vraag-tekst {
  font-family: var(--font-serif); font-size: 1.5rem;
  font-weight: 700; line-height: 1.35; color: var(--cream);
}
.vraag-tekst em { color: var(--gold); font-style: italic; }
.hint-blok {
  font-size: .82rem; color: var(--muted);
  border-left: 3px solid var(--gold);
  padding-left: 14px;
}
.antwoord-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.antw-btn {
  padding: 14px 16px; border-radius: 10px;
  border: 1px solid rgba(201,168,76,.18);
  background: var(--ink3); color: var(--cream);
  font-family: var(--font-sans); font-size: .9rem;
  cursor: pointer; text-align: left;
  transition: border-color .2s, background .2s, transform .15s;
}
.antw-btn:hover:not(:disabled) {
  border-color: var(--gold); transform: translateY(-1px);
}
.antw-btn:disabled { cursor: default; opacity: .85; }
.antw-btn.goed {
  background: rgba(42,125,79,.2); border-color: var(--groen); color: #8eedb5;
}
.antw-btn.fout {
  background: rgba(176,48,48,.18); border-color: var(--rood); color: #e89090;
}
.feedback-blok {
  padding: 14px 16px; border-radius: 10px;
  font-size: .85rem; line-height: 1.55; display: none;
}
.feedback-blok.toon { display: block; }
.feedback-blok.goed-fb {
  background: rgba(42,125,79,.12); border-left: 3px solid var(--groen);
  color: #a8f0c8;
}
.feedback-blok.fout-fb {
  background: rgba(176,48,48,.1); border-left: 3px solid var(--rood);
  color: #eba0a0;
}
.nav-rij {
  display: flex; gap: 12px; margin-top: auto; padding-top: 12px;
}
.btn-ghost {
  padding: 10px 22px; border-radius: 999px;
  border: 1px solid rgba(201,168,76,.25);
  background: transparent; color: var(--cream2);
  font-family: var(--font-sans); font-size: .88rem;
  cursor: pointer; transition: border-color .2s;
}
.btn-ghost:hover { border-color: var(--gold); }
.btn-next {
  padding: 10px 28px; border-radius: 999px; border: none;
  background: var(--gold); color: var(--ink);
  font-family: var(--font-sans); font-size: .92rem; font-weight: 500;
  cursor: pointer; transition: opacity .2s, transform .2s;
}
.btn-next:disabled { opacity: .35; cursor: default; }
.btn-next:hover:not(:disabled) { background: var(--gold2); transform: scale(1.03); }

/* rechts paneel */
.quiz-rechts {
  flex: 1; position: relative; background: var(--ink3);
  display: flex; align-items: center; justify-content: center;
}

/* illustratie paneel (MC) */
.illus-paneel {
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 18px; text-align: center; padding: 40px;
}
.illus-paneel.actief { display: flex; }
.illus-emoji { font-size: 5rem; }
.illus-tekst {
  font-size: 1rem; color: var(--muted);
  max-width: 320px; line-height: 1.5;
}

/* kaart paneel */
.kaart-paneel {
  display: none; position: absolute; inset: 0;
}
.kaart-paneel.actief { display: block; }
#kaart-container {
  width: 100%; height: 100%;
}
.kaart-instructie {
  position: absolute; bottom: 20px; left: 50%;
  transform: translateX(-50%); z-index: 800;
  padding: 8px 22px; border-radius: 999px;
  background: rgba(13,17,23,.88); color: var(--gold);
  font-size: .82rem; border: 1px solid rgba(201,168,76,.25);
  pointer-events: none;
}
.kaart-feedback {
  position: absolute; top: 16px; left: 50%;
  transform: translateX(-50%); z-index: 800;
  padding: 10px 26px; border-radius: 10px;
  font-size: .9rem; font-weight: 500;
  display: none; pointer-events: none;
}
.kaart-feedback.toon { display: block; }
.kaart-feedback.goed-kf {
  background: rgba(42,125,79,.9); color: #fff;
}
.kaart-feedback.fout-kf {
  background: rgba(176,48,48,.9); color: #fff;
}

/* Leaflet overrides */
.leaflet-tile-pane { filter: saturate(0.85) brightness(0.9); }
.leaflet-popup-content-wrapper {
  background: var(--ink2) !important;
  color: var(--cream) !important;
  border: 1px solid rgba(201,168,76,.3) !important;
  border-radius: 10px !important;
}
.leaflet-popup-tip { background: var(--ink2) !important; }
.leaflet-control-zoom a {
  background: var(--ink2) !important;
  color: var(--cream) !important;
  border-color: rgba(201,168,76,.2) !important;
}

/* ── RESULTAAT SCHERM ── */
#v-result {
  align-items: center; justify-content: center; gap: 14px;
  background: var(--ink);
  background-image:
    linear-gradient(rgba(201,168,76,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,168,76,.04) 1px, transparent 1px);
  background-size: 60px 60px;
  text-align: center;
}
.result-emoji { font-size: 4.5rem; }
.result-score {
  font-family: var(--font-serif); font-size: 4rem;
  font-weight: 900; color: var(--gold); line-height: 1;
}
.result-titel {
  font-family: var(--font-serif); font-size: 1.8rem;
  font-weight: 700; color: var(--cream);
}
.result-sub {
  font-size: 1rem; color: var(--muted); max-width: 400px;
}
.result-details {
  display: flex; gap: 40px; margin: 12px 0;
}
.result-details div { text-align: center; }
.result-details .rd-num {
  font-family: var(--font-serif); font-size: 1.8rem;
  font-weight: 700; display: block; line-height: 1.1;
}
.result-details .rd-num.groen { color: var(--groen); }
.result-details .rd-num.rood  { color: var(--rood); }
.result-details .rd-num.goud  { color: var(--gold); }
.result-details .rd-label {
  font-size: .75rem; color: var(--muted); text-transform: uppercase;
  letter-spacing: .08em;
}
.result-btns { display: flex; gap: 14px; margin-top: 10px; }
</style>
</head>
<body>

<!-- ════════════════════ SCHERM 2 — QUIZ ════════════════════ -->
<div id="v-quiz" class="scherm">
  <div class="topbalk">
    <div class="topbalk-links"><a href="#" id="btn-terug">← Leusden</a></div>
    <div class="topbalk-midden">
      <span id="vraag-nr">Vraag 1/15</span>
      <div class="voortgang-track"><div class="voortgang-vul" id="voortgang"></div></div>
    </div>
    <div class="topbalk-rechts"><span id="score-display">0 punten</span></div>
  </div>

  <div class="quiz-body" id="quiz-body">
    <!-- Links: vraagpaneel -->
    <div class="quiz-links" id="quiz-links">
      <div class="badge-pill" id="badge"></div>
      <div class="vraag-tekst" id="vraag-tekst"></div>
      <div class="hint-blok" id="hint-blok"></div>

      <div class="feedback-blok" id="feedback-blok"></div>
      <div class="nav-rij">

        <button class="btn-next" id="btn-next" disabled>Volgende →</button>

        <div id="kaart-container"></div>
        <div class="kaart-instructie" id="kaart-instructie">Klik op de kaart om te antwoorden</div>
        <div class="kaart-feedback" id="kaart-feedback"></div>
      </div>
    </div>
  </div>
</div>

<!-- ════════════════════ SCHERM 3 — RESULTAAT ════════════════════ -->
<div id="v-result" class="scherm">

  <div class="result-score" id="result-score"></div>

    <div><span class="rd-num goud" id="rd-punten">0</span><span class="rd-label">Punten</span></div>

/* ── STATE ── */
let vragen = [];
let huidigIndex = 0;
let score = 0;
let goedCount = 0;
let foutCount = 0;
let map = null;
let wijkLayers = [];
let klikHandler = null;
let beantwoord = false;

/* ── DOM REFS ── */
const $ = id => document.getElementById(id);

/* ── HULPFUNCTIES ── */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function ptInPoly(lat, lng, coords) {
  let inside = false;
  for (let i = 0, j = coords.length - 1; i < coords.length; j = i++) {
    const xi = coords[i][0], yi = coords[i][1];
    const xj = coords[j][0], yj = coords[j][1];
    const intersect = ((yi > lng) !== (yj > lng))
      && (lat < (xj - xi) * (lng - yi) / (yj - yi) + xi);
    if (intersect) inside = !inside;
  }
  return inside;
}

/* ── SCHERMTRANSITIES ── */
function toonScherm(id) {
  const target = $(id);
  document.querySelectorAll('.scherm').forEach(s => {
    if (s === target) return;
    s.classList.remove('in');
    setTimeout(() => s.classList.remove('actief'), 500);
  });
  target.classList.add('actief');
  requestAnimationFrame(() => {
    requestAnimationFrame(() => target.classList.add('in'));
  });
}

/* ── KAART INITIALISATIE ── */
function initKaart() {
  if (map) return;
  map = L.map('kaart-container', {
    zoomControl: false,
    attributionControl: false
  }).setView([52.132, 5.420], 13);

  L.control.zoom({ position: 'bottomright' }).addTo(map);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_matter/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd',
    maxZoom: 18
  }).addTo(map);

  WIJK_POLYGONEN.forEach(w => {
    const poly = L.polygon(w.coords, {
      color: w.kleur,
      weight: 1.2,
      dashArray: '5,6',
      fillColor: w.kleur,
      fillOpacity: 0.08
    }).addTo(map);
    poly.bindTooltip(w.naam, {
      permanent: false,
      className: 'wijk-tooltip',
      direction: 'center'
    });
    wijkLayers.push({ naam: w.naam, layer: poly, kleur: w.kleur, coords: w.coords });
  });
}

function resetWijkStijlen() {
  wijkLayers.forEach(w => {
    w.layer.setStyle({
      color: w.kleur,
      weight: 1.2,
      dashArray: '5,6',
      fillColor: w.kleur,
      fillOpacity: 0.08
    });
  });
}

/* ── QUIZ LOGICA ── */
function startQuiz() {
  vragen = shuffle(ALLE_VRAGEN).slice(0, 15);
  huidigIndex = 0;
  score = 0;
  goedCount = 0;
  foutCount = 0;
  toonScherm('v-quiz');
  // Lazy init kaart na transitie
  setTimeout(() => {
    initKaart();
    laadVraag(0);
  }, 150);
}

function laadVraag(idx) {
  beantwoord = false;
  const v = vragen[idx];

  // Topbalk
  $('vraag-nr').textContent = `Vraag ${idx + 1}/${vragen.length}`;
  $('voortgang').style.width = ((idx) / vragen.length * 100) + '%';
  $('score-display').textContent = score + ' punten';

  // Badge + tekst + hint
  $('badge').textContent = v.badge;
  $('vraag-tekst').innerHTML = v.tekst;
  $('hint-blok').textContent = v.hint;

  // Reset feedback
  $('feedback-blok').className = 'feedback-blok';
  $('feedback-blok').textContent = '';
  $('btn-next').disabled = true;

  // Reset antwoord grid
  $('antwoord-grid').innerHTML = '';

  // Kaart feedback
  $('kaart-feedback').className = 'kaart-feedback';
  $('kaart-feedback').textContent = '';
  $('kaart-instructie').style.display = '';

  if (v.type === 'mc') {
    // Toon illustratie, verberg kaart
    $('illus-paneel').classList.add('actief');
    $('kaart-paneel').classList.remove('actief');
    $('illus-emoji').textContent = v.illus;
    $('illus-tekst').textContent = v.illusTekst;

    // Shuffle opties maar onthoud juiste index
    const indices = v.opties.map((_, i) => i);
    const shuffled = shuffle(indices);
    const juisteIdx = shuffled.indexOf(v.goed);

    shuffled.forEach((origIdx, btnIdx) => {
      const btn = document.createElement('button');
      btn.className = 'antw-btn';
      btn.textContent = v.opties[origIdx];
      btn.addEventListener('click', () => beantwoordMC(btn, btnIdx, juisteIdx, v));
      $('antwoord-grid').appendChild(btn);
    });

  } else if (v.type === 'kaart') {
    // Toon kaart, verberg illustratie
    $('illus-paneel').classList.remove('actief');
    $('kaart-paneel').classList.add('actief');

    setTimeout(() => {
      map.invalidateSize();
      map.setView(v.kaartCenter, v.kaartZoom);
      resetWijkStijlen();
    }, 60);

    // Verwijder oude klikhandler
    if (klikHandler) {
      map.off('click', klikHandler);
      klikHandler = null;
    }

    klikHandler = function(e) {
      if (beantwoord) return;
      beantwoordKaart(e.latlng.lat, e.latlng.lng, v);
    };
    map.on('click', klikHandler);
  }
}

function beantwoordMC(gekozenBtn, gekozenIdx, juisteIdx, v) {
  if (beantwoord) return;
  beantwoord = true;

  const btns = $('antwoord-grid').querySelectorAll('.antw-btn');
  btns.forEach(b => b.disabled = true);

  // Markeer juiste knop
  btns[juisteIdx].classList.add('goed');

  if (gekozenIdx === juisteIdx) {
    score += 10;
    goedCount++;
    toonFeedback(true, v.uitleg);
  } else {
    gekozenBtn.classList.add('fout');
    foutCount++;
    toonFeedback(false, v.uitleg);
  }

  $('score-display').textContent = score + ' punten';
  $('btn-next').disabled = false;
}

function beantwoordKaart(lat, lng, v) {
  beantwoord = true;
  $('kaart-instructie').style.display = 'none';

  // Verwijder klikhandler
  if (klikHandler) {
    map.off('click', klikHandler);
    klikHandler = null;
  }

  // Zoek welke wijk is aangeklikt
  let geklikteWijk = null;
  for (const w of wijkLayers) {
    if (ptInPoly(lat, lng, w.coords)) {
      geklikteWijk = w;
      break;
    }
  }

  // Zoek doelwijk
  const doelWijk = wijkLayers.find(w => w.naam === v.doelWijk);

  if (geklikteWijk && geklikteWijk.naam === v.doelWijk) {
    // Goed!
    score += 10;
    goedCount++;
    doelWijk.layer.setStyle({
      color: '#2a7d4f', fillColor: '#2a7d4f',
      fillOpacity: 0.3, weight: 2.5, dashArray: ''
    });
    toonKaartFeedback(true, 'Goed! ' + v.doelWijk);
    toonFeedback(true, v.uitleg);
  } else {
    // Fout
    foutCount++;
    // Markeer doelwijk groen
    if (doelWijk) {
      doelWijk.layer.setStyle({
        color: '#2a7d4f', fillColor: '#2a7d4f',
        fillOpacity: 0.3, weight: 2.5, dashArray: ''
      });
    }
    // Markeer geklikte wijk rood
    if (geklikteWijk) {
      geklikteWijk.layer.setStyle({
        color: '#b03030', fillColor: '#b03030',
        fillOpacity: 0.25, weight: 2.5, dashArray: ''
      });
      toonKaartFeedback(false, 'Fout — je klikte op ' + geklikteWijk.naam);
    } else {
      toonKaartFeedback(false, 'Fout — je klikte buiten alle wijken');
    }
    toonFeedback(false, v.uitleg);
  }

  $('score-display').textContent = score + ' punten';
  $('btn-next').disabled = false;
}

function toonFeedback(goed, tekst) {
  const fb = $('feedback-blok');
  fb.className = 'feedback-blok toon ' + (goed ? 'goed-fb' : 'fout-fb');
  fb.innerHTML = (goed ? '✓ Goed! ' : '✗ Fout. ') + tekst;
}

function toonKaartFeedback(goed, tekst) {
  const kf = $('kaart-feedback');
  kf.className = 'kaart-feedback toon ' + (goed ? 'goed-kf' : 'fout-kf');
  kf.textContent = tekst;
}

function volgendeVraag() {
  huidigIndex++;
  if (huidigIndex >= vragen.length) {
    toonResultaat();
  } else {
    laadVraag(huidigIndex);
  }
}

function toonResultaat() {
  const pct = Math.round((goedCount / vragen.length) * 100);
  let emoji, titel, sub;

  if (pct === 100) {
    emoji = '🏆'; titel = 'Uitstekend!'; sub = 'Een echte Leusdenaar!';
  } else if (pct >= 80) {
    emoji = '🌟'; titel = 'Heel goed gedaan!'; sub = 'Je kent Leusden bijna als je broekzak.';
  } else if (pct >= 60) {
    emoji = '👍'; titel = 'Goed bezig!'; sub = 'Nog even oefenen en je bent er.';
  } else if (pct >= 40) {
    emoji = '📚'; titel = 'Blijf oefenen!'; sub = 'Rome is ook niet in één dag gebouwd.';
  } else {
    emoji = '🗺️'; titel = 'De kaart helpt je!'; sub = 'Probeer het nog eens — je leert snel!';
  }

  $('result-emoji').textContent = emoji;
  $('result-score').textContent = pct + '%';
  $('result-titel').textContent = titel;
  $('result-sub').textContent = sub;
  $('rd-goed').textContent = goedCount;
  $('rd-fout').textContent = foutCount;
  $('rd-punten').textContent = score;

  toonScherm('v-result');
}

/* ── EVENT LISTENERS ── */
document.addEventListener('DOMContentLoaded', () => {
  // Start met startscherm
  const startEl = $('v-start');
  startEl.classList.add('actief');
  requestAnimationFrame(() => {
    requestAnimationFrame(() => startEl.classList.add('in'));
  });

  $('btn-start').addEventListener('click', startQuiz);
  $('btn-opnieuw').addEventListener('click', startQuiz);
  $('btn-next').addEventListener('click', volgendeVraag);

  $('btn-terug').addEventListener('click', e => {
    e.preventDefault();
    toonScherm('v-start');
  });
  $('btn-stop').addEventListener('click', () => toonScherm('v-start'));
  $('btn-terug-start').addEventListener('click', () => toonScherm('v-start'));
});
